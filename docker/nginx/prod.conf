##
# Production Nginx config for:
# - notification-gg-hub.ru (primary)
# - www.notification-gg-hub.ru (redirect)
# - HTTP -> HTTPS redirect
# - ACME challenge for Let's Encrypt (webroot)
##

# 1) HTTP: serve ACME challenge, redirect everything else to HTTPS apex.
server {
    listen 80;
    server_name notification-gg-hub.ru www.notification-gg-hub.ru;

    # Let's Encrypt HTTP-01 challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://notification-gg-hub.ru$request_uri;
    }
}

# 2) HTTPS: redirect www -> apex.
server {
    listen 443 ssl;
    http2 on;
    server_name www.notification-gg-hub.ru;

    ssl_certificate /etc/letsencrypt/live/notification-gg-hub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notification-gg-hub.ru/privkey.pem;

    return 301 https://notification-gg-hub.ru$request_uri;
}

# 3) HTTPS: main site on apex.
server {
    listen 443 ssl;
    http2 on;
    server_name notification-gg-hub.ru;

    ssl_certificate /etc/letsencrypt/live/notification-gg-hub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notification-gg-hub.ru/privkey.pem;

    # Reasonable defaults
    client_max_body_size 64M;

    root /var/www/html/public;
    index index.php index.html;

    # (Optional) also serve ACME on https
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

