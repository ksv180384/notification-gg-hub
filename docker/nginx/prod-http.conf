##
# Bootstrap (HTTP-only) Nginx config for first Let's Encrypt issuance.
# Serves:
# - ACME HTTP-01 challenge at /.well-known/acme-challenge/
# - Laravel app over HTTP (temporarily), and redirects www -> apex
##

server {
    listen 80;
    server_name notification-gg-hub.ru www.notification-gg-hub.ru;

    # Let's Encrypt HTTP-01 challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Optional: keep canonical host already in bootstrap
    if ($host = www.notification-gg-hub.ru) {
        return 301 http://notification-gg-hub.ru$request_uri;
    }

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

