services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${APP_NAME:-notification-gg-hub}-app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
    depends_on:
      - db
    networks:
      - appnet

  nginx:
    image: nginx:latest
    container_name: ${APP_NAME:-notification-gg-hub}-nginx
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./src:/var/www/html
      # Pick config via .env (e.g. default.conf / prod-http.conf / prod.conf)
      - ./docker/nginx/${NGINX_CONF:-default.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/certbot/conf:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - appnet
    # Reload periodically so renewed certs are picked up (safe even for local).
    command: /bin/sh -c "while :; do sleep 6h; nginx -s reload; done & nginx -g 'daemon off;'"

  db:
    image: mysql:latest
    container_name: ${APP_NAME:-notification-gg-hub}-mysql
    ports:
      - "${DB_PORT_FORWARD:-3306}:3306"
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-app}
      MYSQL_USER: ${DB_USERNAME:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - appnet

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/certbot/conf:/etc/letsencrypt
    # Renew certificates twice a day (Let’s Encrypt recommendation).
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"

volumes:
  dbdata:

networks:
  appnet:
    driver: bridge
