services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${APP_NAME:-notification-gg-hub}-app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
    depends_on:
      - db
    networks:
      - appnet

  nginx:
    image: nginx:latest
    container_name: ${APP_NAME:-notification-gg-hub}-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - appnet

  db:
    image: mysql:latest
    container_name: ${APP_NAME:-notification-gg-hub}-mysql
    ports:
      - "${DB_PORT_FORWARD:-3306}:3306"
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-app}
      MYSQL_USER: ${DB_USERNAME:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - appnet

volumes:
  dbdata:

networks:
  appnet:
    driver: bridge
